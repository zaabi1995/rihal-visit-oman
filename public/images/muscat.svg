<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="mSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="50%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="mGround" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8d5b7"/>
      <stop offset="100%" stop-color="#c9a96e"/>
    </linearGradient>
    <linearGradient id="dome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <linearGradient id="mWater" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0288d1"/>
      <stop offset="100%" stop-color="#01579b"/>
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="600" fill="url(#mSky)"/>
  <!-- Distant mountains -->
  <polygon points="0,320 100,260 200,290 350,230 500,270 650,220 800,280 800,400 0,400" fill="#78909c" opacity="0.3"/>
  <!-- Mosque base -->
  <rect x="200" y="280" width="400" height="120" fill="url(#dome)" rx="2"/>
  <!-- Mosque arches -->
  <rect x="220" y="320" width="50" height="80" fill="#bdbdbd" rx="25" ry="25"/>
  <rect x="290" y="320" width="50" height="80" fill="#bdbdbd" rx="25" ry="25"/>
  <rect x="360" y="320" width="50" height="80" fill="#bdbdbd" rx="25" ry="25"/>
  <rect x="430" y="320" width="50" height="80" fill="#bdbdbd" rx="25" ry="25"/>
  <rect x="500" y="320" width="50" height="80" fill="#bdbdbd" rx="25" ry="25"/>
  <!-- Main dome -->
  <ellipse cx="400" cy="280" rx="100" ry="70" fill="url(#dome)"/>
  <ellipse cx="400" cy="280" rx="95" ry="65" fill="white" opacity="0.3"/>
  <!-- Gold crescent on dome -->
  <circle cx="400" cy="215" r="8" fill="url(#goldAccent)"/>
  <circle cx="403" cy="213" r="6" fill="url(#mSky)"/>
  <line x1="400" y1="205" x2="400" y2="195" stroke="#f9a825" stroke-width="2"/>
  <!-- Side domes -->
  <ellipse cx="280" cy="290" rx="45" ry="35" fill="url(#dome)"/>
  <ellipse cx="520" cy="290" rx="45" ry="35" fill="url(#dome)"/>
  <!-- Minarets -->
  <rect x="185" y="200" width="14" height="200" fill="white"/>
  <rect x="601" y="200" width="14" height="200" fill="white"/>
  <circle cx="192" cy="200" r="8" fill="url(#goldAccent)"/>
  <circle cx="608" cy="200" r="8" fill="url(#goldAccent)"/>
  <line x1="192" y1="190" x2="192" y2="178" stroke="#f9a825" stroke-width="2"/>
  <line x1="608" y1="190" x2="608" y2="178" stroke="#f9a825" stroke-width="2"/>
  <!-- Ground/courtyard -->
  <rect x="0" y="400" width="800" height="80" fill="url(#mGround)"/>
  <!-- Reflecting pool -->
  <rect x="0" y="470" width="800" height="130" fill="url(#mWater)" opacity="0.8"/>
  <!-- Mosque reflection -->
  <g opacity="0.2" transform="translate(0,940) scale(1,-1)">
    <rect x="200" y="280" width="400" height="120" fill="white" rx="2"/>
    <ellipse cx="400" cy="280" rx="100" ry="70" fill="white"/>
    <ellipse cx="280" cy="290" rx="45" ry="35" fill="white"/>
    <ellipse cx="520" cy="290" rx="45" ry="35" fill="white"/>
  </g>
  <!-- Water ripples -->
  <line x1="100" y1="500" x2="200" y2="500" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="350" y1="520" x2="500" y2="520" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="550" y1="540" x2="700" y2="540" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="200" y1="560" x2="400" y2="560" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <!-- Palm trees -->
  <rect x="100" y="330" width="6" height="70" fill="#5d4037"/>
  <ellipse cx="103" cy="325" rx="25" ry="12" fill="#2e7d32"/>
  <ellipse cx="90" cy="330" rx="20" ry="8" fill="#388e3c"/>
  <ellipse cx="116" cy="332" rx="20" ry="8" fill="#1b5e20"/>
  <rect x="700" y="340" width="6" height="60" fill="#5d4037"/>
  <ellipse cx="703" cy="335" rx="25" ry="12" fill="#2e7d32"/>
  <ellipse cx="690" cy="340" rx="20" ry="8" fill="#388e3c"/>
  <ellipse cx="716" cy="342" rx="20" ry="8" fill="#1b5e20"/>
  <!-- Subtle overlay -->
  <rect width="800" height="600" fill="black" opacity="0.05"/>
</svg>